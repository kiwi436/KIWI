[phases.setup]
nixPkgs = ["python312", "freetype", "cairo", "pango", "gcc", "pkg-config", "xorg.libxcb", "xorg.libX11", "gdk-pixbuf"]

[phases.build]
cmds = ["pip install -r requirements.txt", "python manage.py collectstatic --noinput", "python manage.py migrate"]

[start]
cmd = "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 2"
